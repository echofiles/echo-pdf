name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include logs / error messages.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands / inputs.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS / Node version / deployment (local / workers)
