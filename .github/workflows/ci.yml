name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  typecheck-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Runtime check
        run: bun run check:runtime

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Prepare shared public sample cache for acceptance and eval-backed gates
        run: bun run eval:fetch-public-samples -- --sample arxiv-attention-is-all-you-need,irs-form-w4

      - name: Acceptance tests
        run: bun run test:acceptance

      - name: Import smoke tests (npm package behavior guard)
        run: bun run test:import-smoke

      - name: Integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          VERCEL_AI_GATEWAY_KEY: ${{ secrets.VERCEL_AI_GATEWAY_KEY }}
        run: bun run test:integration
